<div class="card">
  <div class="flex flex-col gap-4">
    <div class="grid grid-cols-12 gap-4">
      <div class="col-span-12 flex flex-col gap-1">
        <label for="type">Тип запиту:</label>
        <p-select
          class="w-full"
          id="type"
          [options]="requestTypes"
          [(ngModel)]="selectedType"
          placeholder="Виберіть тип запиту"
        >
          <ng-template pTemplate="selectedItem">
            <app-request-type-badge
              [type]="selectedType"
            ></app-request-type-badge>
          </ng-template>
          <ng-template let-item pTemplate="item">
            <app-request-type-badge
              [type]="item.label"
            ></app-request-type-badge>
          </ng-template>
        </p-select>
      </div>
    </div>
    @if (selectedType) {
    <div class="grid grid-cols-12 gap-4">
      <div class="col-span-12">
        <div>
          @switch (selectedType) { @case (requestType.Return) {
          <app-return-request-create />
          } @case (requestType.FundsWithdrawal) {
          <app-funds-withdrawal-request-create />
          } }
        </div>
      </div>
    </div>
    }
  </div>
</div>
