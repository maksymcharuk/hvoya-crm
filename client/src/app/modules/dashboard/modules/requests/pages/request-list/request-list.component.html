<div class="grid">
  <div class="col-12">
    @if ('create' | able : returnRequestEntity) {
    <div class="flex justify-content-end mb-3">
      <p-button
        label="Створити запит"
        icon="pi pi-plus"
        [routerLink]="'create'"
      ></p-button>
    </div>
    }
    <div class="card p-0">
      <app-request-list
        [requests]="pageRequests$ | async"
        (onLoadData)="loadOrders($event)"
      ></app-request-list>
    </div>
  </div>
</div>
