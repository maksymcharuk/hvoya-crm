<form
  class="flex flex-col gap-4"
  [formGroup]="updateProfileForm"
  (ngSubmit)="onSubmit(updateProfileForm.value)"
>
  <h5>Персональні дані</h5>

  <div class="flex flex-col gap-1">
    <label for="account-number">Номер договору:</label>
    <p-iconField iconPosition="right" class="w-full">
      <p-inputIcon
        [styleClass]="accountNumberCopied ? 'pi pi-check' : 'pi pi-copy'"
      />
      <input
        id="account-number"
        class="w-full"
        [value]="accountNumber"
        type="text"
        pInputText
        readonly
        (click)="copyAccountNumber()"
      />
    </p-iconField>
  </div>
  <div class="flex flex-col gap-1">
    <label for="phoneNumber">Номер телефону:</label>
    <p-inputMask
      class="w-full"
      name="phoneNumber"
      inputId="phoneNumber"
      formControlName="phoneNumber"
      mask="+38 (999) 999-9999"
      slotChar=" "
      [unmask]="true"
      [autoClear]="false"
      placeholder="Введіть номер телефону"
      data-cy="phone-number"
    ></p-inputMask>
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="phoneNumber"
      errorType="required"
      errorMessage="Потрібно ввести номер телефону"
    >
    </app-form-control-error-message>
  </div>
  <div class="flex flex-col gap-1">
    <label for="lastName">Прізвище:</label>
    <input
      class="w-full"
      id="lastName"
      name="lastName"
      formControlName="lastName"
      type="text"
      pInputText
      placeholder="Введіть прізвище"
      data-cy="last-name"
    />
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="lastName"
      errorType="required"
      errorMessage="Потрібно ввести прізвище"
    >
    </app-form-control-error-message>
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="lastName"
      errorType="cyrillic"
      errorMessage="Прізвище повинно містити лише літери українського алфавіту"
    >
    </app-form-control-error-message>
  </div>
  <div class="flex flex-col gap-1">
    <label for="firstName">Ім'я:</label>
    <input
      class="w-full"
      id="firstName"
      name="firstName"
      formControlName="firstName"
      type="text"
      pInputText
      placeholder="Введіть ваше ім'я"
      data-cy="first-name"
    />
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="firstName"
      errorType="required"
      errorMessage="Потрібно ввести ім'я"
    >
    </app-form-control-error-message>
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="firstName"
      errorType="cyrillic"
      errorMessage="Ім'я повинно містити лише літери українського алфавіту"
    >
    </app-form-control-error-message>
  </div>
  <div class="flex flex-col gap-1">
    <label for="middleName">По батькові:</label>
    <input
      class="w-full"
      id="middleName"
      name="middleName"
      formControlName="middleName"
      type="text"
      pInputText
      placeholder="Введіть ваші по батькові"
      data-cy="middle-name"
    />
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="middleName"
      errorType="required"
      errorMessage="Потрібно ввести ваше по батькові"
    >
    </app-form-control-error-message>
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="middleName"
      errorType="cyrillic"
      errorMessage="По батькові повинно містити лише літери українського алфавіту"
    >
    </app-form-control-error-message>
  </div>
  <div class="flex flex-col gap-1">
    <label for="website">
      Веб-сайт або сторінка у соц. мережі
      <i
        class="pi pi-info-circle"
        pTooltip="Посилання на веб-сайт або сторінку магазину на маркетплейсі де будуть розміщені товари"
        tooltipPosition="top"
      ></i>
      :
    </label>
    <input
      class="w-full"
      id="website"
      name="website"
      formControlName="website"
      type="text"
      pInputText
      placeholder="Веб-сайт/соціальна мережа"
      data-cy="website"
    />
    <app-form-control-error-message
      [formGroup]="updateProfileForm"
      controlName="website"
      errorType="required"
      errorMessage="Потрібно ввести посилання на веб-сайт або сторінку у соціальній мережі"
    >
    </app-form-control-error-message>
  </div>
  <button
    pButton
    type="submit"
    label="Зберегти"
    data-cy="submit"
    [disabled]="isLoading"
  ></button>
</form>
