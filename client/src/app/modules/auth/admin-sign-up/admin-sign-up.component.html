<div class="admin-sign-up">
  <a routerLink="/">
    <img src="assets/images/logo.svg" alt="logo" />
  </a>
  <div class="admin-sign-up-wrapper">
    <div class="admin-sign-up-wrapper-title">
      <h3>Реєстрація</h3>
    </div>
    <form
      class="w-full"
      [formGroup]="adminSignUpForm"
      (ngSubmit)="onSubmit()"
    >
      <div class="admin-sign-up-wrapper-form">
        <div class="grid grid-cols-1 gap-4">
          <!-- Left column -->
          <div class="col-span-12 flex flex-col gap-4">
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-email">Пошта</label>
              <p-iconField iconPosition="right" class="w-full">
                <p-inputIcon styleClass="pi pi-user" />
                <input
                  class="w-full"
                  id="admin-sign-up-email"
                  name="email"
                  formControlName="email"
                  type="email"
                  pInputText
                  data-cy="email"
                  [readonly]="true"
                  [disabled]="true"
                />
              </p-iconField>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-phone-number">Номер телефону</label>
              <p-inputMask
                class="w-full"
                name="phoneNumber"
                inputId="admin-sign-up-phone-number"
                formControlName="phoneNumber"
                mask="+38 (999) 999-9999"
                slotChar=" "
                [unmask]="true"
                [autoClear]="false"
                placeholder="Введіть номер телефону"
                data-cy="phone-number"
              ></p-inputMask>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="phoneNumber"
                errorType="required"
                errorMessage="Потрібно ввести номер телефону"
              >
              </app-form-control-error-message>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-last-name">Прізвище</label>
              <input
                class="w-full"
                id="admin-sign-up-last-name"
                name="lastName"
                formControlName="lastName"
                type="text"
                pInputText
                placeholder="Введіть прізвище"
                data-cy="last-name"
              />
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="lastName"
                errorType="required"
                errorMessage="Потрібно ввести прізвище"
              >
              </app-form-control-error-message>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="lastName"
                errorType="cyrillic"
                errorMessage="Прізвище повиннe містити лише літери українського алфавіту"
              >
              </app-form-control-error-message>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-first-name">Ім'я</label>
              <input
                class="w-full"
                id="admin-sign-up-first-name"
                name="firstName"
                formControlName="firstName"
                type="text"
                pInputText
                placeholder="Введіть ваше ім'я"
                data-cy="first-name"
              />
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="firstName"
                errorType="required"
                errorMessage="Потрібно ввести ім'я"
              >
              </app-form-control-error-message>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="firstName"
                errorType="cyrillic"
                errorMessage="Ім'я повиннe містити лише літери українського алфавіту"
              >
              </app-form-control-error-message>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-middle-name">По батькові</label>
              <input
                class="w-full"
                id="admin-sign-up-middle-name"
                name="middleName"
                formControlName="middleName"
                type="text"
                pInputText
                placeholder="Введіть ваші по батькові"
                data-cy="middle-name"
              />
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="middleName"
                errorType="required"
                errorMessage="Потрібно ввести ваше по батькові"
              >
              </app-form-control-error-message>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="middleName"
                errorType="cyrillic"
                errorMessage="По батькові повиннe містити лише літери українського алфавіту"
              >
              </app-form-control-error-message>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-password">Пароль</label>
              <p-password
                fluid
                inputId="admin-sign-up-password"
                name="password"
                formControlName="password"
                [toggleMask]="true"
                placeholder="Введіть пароль"
                data-cy="password"
              >
                <ng-template pTemplate="footer">
                  <p-divider></p-divider>
                  <p class="mt-2">Вимоги до паролю</p>
                  <ul class="pl-2 ml-2 mt-0" style="line-height: 1.5">
                    <li [ngClass]="{ valid: !hasLowerCase }">
                      Хоча б одна мала літера @if (!hasLowerCase) {
                      <i class="pi pi-check"></i>
                      }
                    </li>
                    <li [ngClass]="{ valid: !hasUpperCase }">
                      Хоча б одна велика літера @if (!hasUpperCase) {
                      <i class="pi pi-check"></i>
                      }
                    </li>
                    <li [ngClass]="{ valid: !hasNumeric }">
                      Хоча б одна цифра @if (!hasNumeric) {
                      <i class="pi pi-check"></i>
                      }
                    </li>
                    <li [ngClass]="{ valid: !hasMinLength }">
                      Не менше 8 символів @if (!hasMinLength) {
                      <i class="pi pi-check"></i>
                      }
                    </li>
                  </ul>
                </ng-template>
              </p-password>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="password"
                errorType="required"
                errorMessage="Потрібно ввести пароль"
              >
              </app-form-control-error-message>
            </div>
            <div class="flex flex-col gap-1.5">
              <label for="admin-sign-up-confirm-password">
                Підтвердіть пароль
              </label>
              <p-password
                fluid
                inputId="admin-sign-up-confirm-password"
                name="confirmPassword"
                formControlName="confirmPassword"
                [toggleMask]="true"
                [feedback]="false"
                placeholder="Підтвердіть пароль"
                data-cy="confirm-password"
              >
              </p-password>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="confirmPassword"
                errorType="required"
                errorMessage="Потрібно підтвердити пароль"
              >
              </app-form-control-error-message>
              <app-form-control-error-message
                [formGroup]="adminSignUpForm"
                controlName="confirmPassword"
                errorType="mismatch"
                errorMessage="Паролі не збігаються"
              >
              </app-form-control-error-message>
            </div>
          </div>
        </div>
        <div
          class="mt-8 flex flex-col-reverse gap-4 sm:flex-row sm:items-center sm:justify-between"
        >
          <a [routerLink]="['/', 'auth', 'sign-in']">Вхід</a>
          <button
            class="w-full sm:w-auto"
            type="submit"
            pButton
            label="Зареєструватися"
            [disabled]="isLoading"
          ></button>
        </div>
      </div>
    </form>
  </div>
</div>
