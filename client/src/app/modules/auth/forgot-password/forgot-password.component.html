<div class="reset-password">
  <a routerLink="/">
    <img src="assets/images/logo.svg" alt="logo" />
  </a>
  <div class="reset-password-wrapper">
    <h3>Відновити пароль</h3>
    <form
      class="reset-password-wrapper-form flex flex-col gap-6"
      [formGroup]="forgotPasswordForm"
      (ngSubmit)="onSubmit(forgotPasswordForm.value)"
    >
      <div class="grid grid-cols-1 gap-4">
        <div class="flex flex-col gap-1.5">
          <label for="forgot-password-email">Пошта</label>
          <input
            class="w-full"
            name="email"
            formControlName="email"
            id="forgot-password-email"
            type="email"
            placeholder="Введіть пошту"
            pInputText
          />
          <app-form-control-error-message
            [formGroup]="forgotPasswordForm"
            controlName="email"
            errorType="required"
            errorMessage="Потрібно ввести пошту"
          >
          </app-form-control-error-message>
        </div>
      </div>
      <button
        class="w-full"
        [disabled]="isLoading"
        type="submit"
        pButton
        label="Підтвердити"
      ></button>
      <div class="text-center text-sm">
        <a class="mb-4" [routerLink]="['/', 'auth', 'sign-in']">
          Перейти на сторінку входу
        </a>
      </div>
    </form>
  </div>
</div>
