<div class="card transfer">
  @if (submitting) {
  <p-progressBar
    class="transfer__progress"
    mode="indeterminate"
    [style]="{ height: '4px' }"
  ></p-progressBar>
  }
  <form [formGroup]="importForm" (ngSubmit)="onImportSubmit()">
    <div class="p-fluid">
      <h5>Імпорт продуктів</h5>
      <div class="field">
        <label for="import-source">Джерело імпорту:</label>
        <p-select
          id="import-source"
          [options]="importSources"
          formControlName="source"
          optionValue="value"
        ></p-select>
        <app-form-control-error-message
          [formGroup]="importForm"
          controlName="source"
          errorType="required"
          errorMessage="Необхідно обрати джерело імпорту"
        ></app-form-control-error-message>
      </div>
      <div class="field">
        <p-selectButton
          formControlName="sourceType"
          [options]="importSourceTypes"
        ></p-selectButton>
      </div>
      @if (sourceType?.value === importSourceTypeEnum.Link) {
      <div class="field">
        <label for="link">Посилання:</label>
        <input id="link" pInputText formControlName="link" />
        <app-form-control-error-message
          [formGroup]="importForm"
          controlName="link"
          errorType="required"
          errorMessage="Необхідно ввести посилання"
        ></app-form-control-error-message>
      </div>
      }
    </div>
    @if (sourceType?.value === importSourceTypeEnum.File) {
    <div class="formgrid">
      <div class="field">
        <label>Файл (XML/XLS):</label>
        <p-fileUpload
          accept=".xml, .xls, .xlsx"
          [customUpload]="true"
          [auto]="true"
          [maxFileSize]="10000000"
          [disabled]="file!.disabled"
          (uploadHandler)="onFileUpload($event)"
        >
        </p-fileUpload>
        <app-form-control-error-message
          [formGroup]="importForm"
          controlName="file"
          errorType="required"
          errorMessage="Необхідно вибрати файл"
        ></app-form-control-error-message>
      </div>
    </div>
    }
    <button
      pButton
      type="submit"
      label="Імпортувати"
      [disabled]="submitting"
    ></button>
  </form>
</div>
