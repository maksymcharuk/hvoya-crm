<p-table
  [value]="rows()"
  [columns]="columns()"
  styleClass="p-datatable-sm"
  [tableStyle]="{ 'min-width': '20rem' }"
>
  <ng-template #header let-columns>
    <tr>
      @for (col of columns; track col.field) {
        <th>{{ col.header }}</th>
      }
    </tr>
  </ng-template>

  <ng-template #body let-row let-columns="columns">
    <tr>
      @for (col of columns; track col.field) {
        <td>{{ row[col.field] ?? '—' }}</td>
      }
    </tr>
  </ng-template>

  <ng-template #emptymessage>
    <tr>
      <td [attr.colspan]="columns().length || 1" class="text-center text-muted-color">
        Немає даних
      </td>
    </tr>
  </ng-template>
</p-table>
