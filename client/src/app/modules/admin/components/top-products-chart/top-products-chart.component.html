<form
  [formGroup]="filtersForm"
  class="p-fluid formgrid grid grid-cols-12 gap-4 justify-end"
>
  <div class="col-fixed">
    <div class="field">
      <label>Період:</label>
      <p-datepicker
        formControlName="range"
        selectionMode="range"
        appendTo="body"
        placeholder="Період"
      ></p-datepicker>
    </div>
  </div>
</form>

@if (!loading) {
<p-chart type="bar" [data]="data" [options]="options"></p-chart>
} @else {
<div class="flex justify-between items-end">
  <p-skeleton height="350px" class="skeleton"></p-skeleton>
  <p-skeleton height="100px" class="skeleton"></p-skeleton>
  <p-skeleton height="250px" class="skeleton"></p-skeleton>
  <p-skeleton height="85px" class="skeleton"></p-skeleton>
  <p-skeleton height="150px" class="skeleton"></p-skeleton>
</div>
}
