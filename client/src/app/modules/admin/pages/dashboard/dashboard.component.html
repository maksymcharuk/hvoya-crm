<div class="grid">
  <div class="col-12">
    <p-tabView (onChange)="onTabChange($event)">
      <p-tabPanel header="AI Аналітика" leftIcon="pi pi-sparkles">
        <div class="card p-0">
          <app-nlq-chat *ngIf="activatedTabs.has(0)" />
        </div>
      </p-tabPanel>

      <p-tabPanel header="Замовлення" leftIcon="pi pi-shopping-cart">
        <app-orders-overview *ngIf="activatedTabs.has(1)" />
      </p-tabPanel>

      <p-tabPanel header="Дропшипери" leftIcon="pi pi-list">
        <app-dropshippers-analytics *ngIf="activatedTabs.has(2)" />
      </p-tabPanel>

      <p-tabPanel header="Продукти" leftIcon="pi pi-box">
        <app-products-overview *ngIf="activatedTabs.has(3)" />
      </p-tabPanel>
    </p-tabView>
  </div>
</div>
