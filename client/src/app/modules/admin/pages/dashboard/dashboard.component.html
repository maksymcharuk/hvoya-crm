<div class="grid">
  <!-- Analytics Sections -->
  <div class="col-12">
    <p-tabView>
      <p-tabPanel header="Дропшипери" leftIcon="pi pi-list">
        <div class="card">
          <app-dropshippers-analytics />
        </div>
      </p-tabPanel>
      <p-tabPanel header="Замовлення" leftIcon="pi pi-shopping-cart">
        <div class="grid">
          <div class="col-12">
            <div class="card">
              <h5>Лійка конверсії замовлень</h5>
              <app-orders-funnel-chart />
            </div>
          </div>
          <div class="col-12">
            <div class="card">
              <h5>Замовлення за статусом</h5>
              <app-orders-status-chart />
            </div>
          </div>
        </div>
      </p-tabPanel>
      <p-tabPanel header="Продукти" leftIcon="pi pi-box">
        <div class="grid">
          <div class="col-12">
            <div class="card">
              <h5>Топ 10 продуктів за доходом</h5>
              <app-top-products-chart />
            </div>
          </div>
          <div class="col-12">
            <div class="card">
              <app-products-analytics />
            </div>
          </div>
        </div>
      </p-tabPanel>
      <p-tabPanel header="AI Аналітика" leftIcon="pi pi-sparkles">
        <div class="card p-0">
          <app-nlq-chat />
        </div>
      </p-tabPanel>
    </p-tabView>
  </div>
</div>
