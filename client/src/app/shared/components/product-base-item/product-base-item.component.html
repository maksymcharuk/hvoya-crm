<div class="card flex flex-col w-full">
  <div class="wrapper mb-4">
    <a [routerLink]="[product.id?.toString()]">
      <app-image-component
        class="wrapper__img"
        [image]="primaryImageUrl"
      ></app-image-component>
    </a>
  </div>
  <ng-template #imageWrapperSkeleton>
    <p-skeleton height="15rem" width="100%"></p-skeleton>
  </ng-template>
  <div class="grow my-2">
    @if (product.name) {
    <a
      [routerLink]="[product.id?.toString()]"
      class="text-surface-900 font-medium text-xl"
      data-cy="product-name"
    >
      {{ product.name }}
    </a>
    } @else {
    <p-skeleton height="2rem" width="100%"></p-skeleton>
    }
  </div>
</div>
