@if (formGroup.get(controlName)?.invalid && (formGroup.get(controlName)?.dirty
|| formGroup.get(controlName)?.touched)) {
<div class="mt-1">
  @if (formGroup.get(controlName)?.errors![errorType]) {
  <p-message severity="error" variant="simple" size="small">
    {{ errorMessage }}
  </p-message>
  }
</div>
}
