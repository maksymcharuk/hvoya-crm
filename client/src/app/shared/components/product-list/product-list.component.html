<div class="grid grid-cols-12 gap-4">
  @if (products$ | async; as products) { @if (products.length > 0) { @for
  (product of products; track product) {
  <div class="flex col-span-12 md:col-span-6 lg:col-span-4 mb-8 md:mb-0">
    <app-product-item
      class="flex"
      data-cy="product-item"
      [product]="product"
      [hideAddToCartButton]="hideAddToCartButton"
      (addToCart)="onAddToCart($event)"
    ></app-product-item>
  </div>
  } } @else {
  <div class="col-span-12 my-8 text-center">
    За вашим запитом нічого не знайдено. Спробуйте змінити параметри.
  </div>
  } } @else { @for (_ of [].constructor(10); track $index) {
  <div class="col-span-12 md:col-span-6 lg:col-span-4 mb-8 md:mb-0">
    <div class="card">
      <div class="skeleton-wrapper mb-4">
        <p-skeleton width="100%" styleClass="skeleton-wrapper-img"></p-skeleton>
      </div>
      <p-skeleton width="100%" height="20px"></p-skeleton>
      <div class="my-2">
        <p-skeleton width="100%" height="25px"></p-skeleton>
      </div>
      <div class="my-6 flex justify-between">
        <p-skeleton width="5rem" height="16px"></p-skeleton>
        <p-skeleton width="5rem" height="16px"></p-skeleton>
      </div>
      <p-skeleton width="100%" height="39px"></p-skeleton>
    </div>
  </div>
  } }
</div>
