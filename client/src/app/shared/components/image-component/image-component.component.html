@if (isLoading) {
<div
  class="flex items-center justify-center"
  [style]="{ height: height, width: width }"
>
  <p-progressSpinner styleClass="w-8 h-8"></p-progressSpinner>
</div>
}
<img
  [src]="image"
  [style]="{
    visibility: isLoading ? 'hidden' : '',
    height: height,
    width: width
  }"
  (load)="hideLoader()"
  (error)="hideLoader()"
/>
